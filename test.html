<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .success {
            color: #34c759;
            font-size: 24px;
            margin: 20px 0;
        }
        .info {
            color: #8e8e93;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>GitHub Pages Test</h1>
    <div class="success">✓ Deployment Successful</div>
    <div class="info">If you can see this page, GitHub Pages is working correctly.</div>
    <div class="info">Current time: <span id="time"></span></div>
    <div class="info">User agent: <span id="ua"></span></div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        document.getElementById('ua').textContent = navigator.userAgent;
        console.log('Test page loaded successfully');
    </script>
</body>
</html>
